<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RetroNES</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* Header */
header {
  padding: 15px;
  font-size: 24px;
  font-weight: bold;
  background: #020617;
  text-align: center;
}

/* Game grid */
#library {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  text-align: center;
}

.game:hover {
  transform: scale(1.05);
  background: #334155;
}

.game img {
  width: 100%;
  border-radius: 8px;
}

/* Player */
#playerContainer {
  display: none;
  text-align: center;
  padding: 20px;
}

canvas {
  image-rendering: pixelated;
  border: 4px solid #22c55e;
}

/* Back button */
button {
  margin-top: 15px;
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<header>🎮 RetroNES Library</header>

<!-- GAME LIBRARY -->
<div id="library"></div>

<!-- PLAYER -->
<div id="playerContainer">
  <canvas id="screen" width="256" height="240"></canvas><br>
  <button onclick="goBack()">⬅ Back to Library</button>
</div>

<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>

<script>
const games = [
  {
    name: "Super Mario Bros",
    file: "roms/mario.nes",
    cover: "https://i.imgur.com/3W3QZ6R.png"
  },
  {
    name: "Legend of Zelda",
    file: "roms/zelda.nes",
    cover: "https://i.imgur.com/UYiroys.png"
  },
  {
    name: "Mega Man",
    file: "roms/megaman.nes",
    cover: "https://i.imgur.com/9yG6F5B.png"
  }
];

// Build library UI
const library = document.getElementById("library");

games.forEach(game => {
  const div = document.createElement("div");
  div.className = "game";
  div.innerHTML = `
    <img src="${game.cover}">
    <p>${game.name}</p>
  `;
  div.onclick = () => loadGame(game.file);
  library.appendChild(div);
});

// Emulator setup
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");
const imageData = ctx.createImageData(256, 240);

const nes = new jsnes.NES({
  onFrame: function(framebuffer) {
    for (let i = 0; i < framebuffer.length; i++) {
      const pixel = framebuffer[i];
      imageData.data[i * 4 + 0] = (pixel >> 16) & 0xFF;
      imageData.data[i * 4 + 1] = (pixel >> 8) & 0xFF;
      imageData.data[i * 4 + 2] = pixel & 0xFF;
      imageData.data[i * 4 + 3] = 255;
    }
    ctx.putImageData(imageData, 0, 0);
  }
});

function frame() {
  nes.frame();
  requestAnimationFrame(frame);
}

// Load game
function loadGame(path) {
  fetch(path)
    .then(res => res.arrayBuffer())
    .then(data => {
      const binary = String.fromCharCode(...new Uint8Array(data));
      nes.loadROM(binary);

      document.getElementById("library").style.display = "none";
      document.getElementById("playerContainer").style.display = "block";

      frame();
    });
}

// Back button
function goBack() {
  location.reload();
}

// Controls
document.addEventListener("keydown", (e) => {
  const map = {
    ArrowUp: 4,
    ArrowDown: 5,
    ArrowLeft: 6,
    ArrowRight: 7,
    z: 0,
    x: 1,
    Enter: 3,
    Shift: 2
  };
  if (map[e.key] !== undefined) nes.buttonDown(1, map[e.key]);
});

document.addEventListener("keyup", (e) => {
  const map = {
    ArrowUp: 4,
    ArrowDown: 5,
    ArrowLeft: 6,
    ArrowRight: 7,
    z: 0,
    x: 1,
    Enter: 3,
    Shift: 2
  };
  if (map[e.key] !== undefined) nes.buttonUp(1, map[e.key]);
});
</script>

</body>
</html>
