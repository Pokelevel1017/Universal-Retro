```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0e0e10;color:#fff}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #222}
.logo{font-weight:600}

/* SEARCH */
#searchInput{
background:#18181b;border:1px solid #333;color:#fff;
padding:8px 12px;border-radius:8px;outline:none;
}

/* GRID */
.content{padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}

/* CARD */
.card{background:#18181b;border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover}
.card-title{padding:10px;font-size:14px}

/* EMULATOR */
#emu{display:none;height:100vh;background:#000;flex-direction:column}
#emu.active{display:flex}
#screen{flex:1}
#screen canvas{width:100%!important;height:100%!important}
.bar{padding:10px;background:#111;border-bottom:1px solid #222;display:flex;gap:10px}
button{background:#222;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<!-- LIBRARY -->
<div id="lib">
  <div class="topbar">
    <div class="logo">Arcade</div>
    <input id="searchInput" placeholder="Search..." oninput="filterGames()">
  </div>

  <div class="content">
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- EMULATOR -->
<div id="emu">
  <div class="bar">
    <button onclick="exitGame()">Back</button>
    <div id="title"></div>
  </div>
  <div id="screen"></div>
</div>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
// ───────── GAMES ─────────
const GAMES = [
  { title:"Super Mario Bros", rom:"roms/mario.nes" },
  { title:"Zelda", rom:"roms/zelda.nes" },
  { title:"Mega Man 2", rom:"roms/megaman2.nes" },
  { title:"Contra", rom:"roms/contra.nes" }
];

// ───────── AUTO COVER ─────────
function getCover(title){
  return `https://raw.githubusercontent.com/libretro-thumbnails/Nintendo%20-%20Nintendo%20Entertainment%20System/Named_Boxarts/${encodeURIComponent(title)}.png`;
}

// ───────── BUILD GRID ─────────
let filtered=[...GAMES];

function build(){
  const grid=document.getElementById("grid");
  grid.innerHTML=filtered.map((g,i)=>`
    <div class="card" onclick="play(${i})">
      <img src="${getCover(g.title)}"
           onerror="this.src='https://via.placeholder.com/300x400?text=No+Cover'">
      <div class="card-title">${g.title}</div>
    </div>
  `).join("");
}

// ───────── SEARCH ─────────
function filterGames(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  filtered=GAMES.filter(g=>g.title.toLowerCase().includes(q));
  build();
}

// ───────── PLAY GAME ─────────
function play(i){
  const g=filtered[i];

  document.getElementById("lib").style.display="none";
  document.getElementById("emu").classList.add("active");
  document.getElementById("title").innerText=g.title;

  const container=document.getElementById("screen");
  container.innerHTML="";

  window.EJS_player="#screen";
  window.EJS_core="nes";
  window.EJS_gameUrl=g.rom;
  window.EJS_pathtodata="https://cdn.emulatorjs.org/stable/data/";
  window.EJS_startOnLoaded=true;

  if(window.EJS_load) window.EJS_load();
}

// ───────── EXIT ─────────
function exitGame(){
  document.getElementById("emu").classList.remove("active");
  document.getElementById("lib").style.display="block";
  document.getElementById("screen").innerHTML="";
}

// INIT
build();
</script>

</body>
</html>
```
