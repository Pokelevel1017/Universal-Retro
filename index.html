<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NES Classic Emulator</title>
<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:monospace;
    display:flex;
    height:100vh;
}

.left{
    width:300px;
    background:#1c1c1c;
    padding:10px;
    overflow-y:auto;
    border-right:2px solid #333;
}

.right{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

h1{
    font-size:16px;
    color:#ff3b3b;
    text-align:center;
}

canvas{
    width:512px;
    height:480px;
    image-rendering:pixelated;
    border:6px solid #444;
    background:black;
}

.game{
    display:flex;
    gap:10px;
    padding:8px;
    cursor:pointer;
    border-bottom:1px solid #333;
}

.game:hover{
    background:#2a2a2a;
}

.game img{
    width:50px;
    height:70px;
    object-fit:cover;
    border:1px solid #555;
}

</style>
</head>
<body>

<div class="left">
<h1>NES Library</h1>
<div id="gameList"></div>
</div>

<div class="right">
<canvas id="screen" width="256" height="240"></canvas>
</div>

<script>
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");
const imageData = ctx.getImageData(0,0,256,240);

let frameRunning = false;

const nes = new jsnes.NES({
    onFrame: function(framebuffer_24){
        for(let i=0;i<framebuffer_24.length;i++){
            const pixel = framebuffer_24[i];
            imageData.data[i*4] = pixel & 0xFF;
            imageData.data[i*4+1] = (pixel>>8) & 0xFF;
            imageData.data[i*4+2] = (pixel>>16) & 0xFF;
            imageData.data[i*4+3] = 255;
        }
        ctx.putImageData(imageData,0,0);
    }
});

function gameLoop(){
    if(frameRunning){
        nes.frame();
    }
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

function loadROM(binaryString){
    nes.loadROM(binaryString);
    frameRunning = true;
}

// Convert file or fetch buffer properly
async function fetchROM(path){
    const res = await fetch(path);
    const buffer = await res.arrayBuffer();
    const bytes = new Uint8Array(buffer);

    let binary = "";
    for(let i=0;i<bytes.length;i++){
        binary += String.fromCharCode(bytes[i]);
    }

    return binary;
}

// Box art
function getBoxArt(name){
    const clean = name.replace(".nes","");
    return `https://thumbnails.libretro.com/Nintendo%20-%20Nintendo%20Entertainment%20System/Named_Boxarts/${encodeURIComponent(clean)}.png`;
}

// ROM list
async function loadGames(){
    const romPath = "./roms/nes/";

    try{
        const res = await fetch("./roms/nes/roms.json");
        const roms = await res.json();

        const list = document.getElementById("gameList");

        roms.forEach(rom=>{
            const div = document.createElement("div");
            div.className="game";

            const img = document.createElement("img");
            img.src = getBoxArt(rom);
            img.onerror = ()=>img.src="https://via.placeholder.com/50x70?text=?";

            const label = document.createElement("div");
            label.textContent = rom.replace(".nes","");

            div.appendChild(img);
            div.appendChild(label);

            div.onclick = async ()=>{
                const bin = await fetchROM(romPath+rom);
                loadROM(bin);
            };

            list.appendChild(div);
        });

    }catch(e){
        console.log("No ROM list");
    }
}

loadGames();
</script>

</body>
</html>
