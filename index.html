<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade NES Hub (Netflix Coverflow)</title>
<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:monospace;
    overflow:hidden;
}

#app{
    display:flex;
    height:100vh;
}

/* NETFLIX STYLE SIDEBAR */
#sidebar{
    width:420px;
    background:#141414;
    border-right:2px solid #2a2a2a;
    overflow-x:auto;
    overflow-y:hidden;
    display:flex;
    gap:18px;
    padding:30px 20px;
    scroll-snap-type:x mandatory;
}

.card{
    flex:0 0 auto;
    width:180px;
    transition:transform 0.35s ease, opacity 0.35s ease;
    cursor:pointer;
    opacity:0.4;
    transform:scale(0.85);
    scroll-snap-align:center;
    text-align:center;
}

.card.active{
    opacity:1;
    transform:scale(1.15);
}

.card img{
    width:180px;
    height:240px;
    object-fit:cover;
    border:2px solid #444;
    border-radius:6px;
}

.meta{
    font-size:10px;
    color:#aaa;
    margin-top:6px;
    line-height:1.3em;
}

.title{
    font-size:12px;
    margin-top:4px;
    color:#fff;
}

#screenArea{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

canvas{
    width:512px;
    height:480px;
    background:black;
    border:6px solid #333;
    image-rendering:pixelated;
}

#controls{
    margin-top:10px;
}

button{
    background:#222;
    color:#fff;
    border:1px solid #444;
    padding:6px 10px;
    cursor:pointer;
}

button:hover{background:#333;}

#boot{
    position:absolute;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    letter-spacing:3px;
}

#boot.hide{display:none;}
</style>
</head>
<body>

<div id="app">

<div id="sidebar"></div>

<div id="screenArea">
<div id="boot">BOOTING...</div>
<canvas id="screen" width="256" height="240"></canvas>

<div id="controls">
<button onclick="saveState()">Save</button>
<button onclick="loadState()">Load</button>
</div>

</div>
</div>

<script>
let nesRunning=false;
let saveData=null;
let roms=[];
let current=0;

const canvas=document.getElementById("screen");
const ctx=canvas.getContext("2d");
const imageData=ctx.getImageData(0,0,256,240);

const nes=new jsnes.NES({
    onFrame(framebuffer){
        for(let i=0;i<framebuffer.length;i++){
            const p=framebuffer[i];
            imageData.data[i*4]=p&255;
            imageData.data[i*4+1]=(p>>8)&255;
            imageData.data[i*4+2]=(p>>16)&255;
            imageData.data[i*4+3]=255;
        }
        ctx.putImageData(imageData,0,0);
    }
});

function loop(){
    if(nesRunning) nes.frame();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

window.onload=()=>{
    setTimeout(()=>document.getElementById("boot").classList.add("hide"),900);
};

function loadROM(bin){
    nes.loadROM(bin);
    nesRunning=true;
}

async function fetchROM(path){
    const r=await fetch(path);
    const b=await r.arrayBuffer();
    const u=new Uint8Array(b);
    let s="";
    for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]);
    return s;
}

function saveState(){ saveData=nes.toJSON(); alert("Saved state"); }
function loadState(){ if(saveData) nes.fromJSON(saveData); }

function art(file){
    const clean=file.replace('.nes','');
    return `https://thumbnails.libretro.com/Nintendo%20-%20Nintendo%20Entertainment%20System/Named_Boxarts/${encodeURIComponent(clean)}.png`;
}

function meta(r){
    return `${r.year} | ${r.dev} | ${r.genre} | ⭐${r.rating}`;
}

function render(){
    const side=document.getElementById("sidebar");
    side.innerHTML="";

    roms.forEach((r,i)=>{
        const c=document.createElement("div");
        c.className="card"+(i===current?" active":"");

        const img=document.createElement("img");
        img.src=art(r.file);
        img.onerror=()=>img.src="https://via.placeholder.com/180x240?text=No+Art";

        const t=document.createElement("div");
        t.className="title";
        t.textContent=r.title;

        const m=document.createElement("div");
        m.className="meta";
        m.textContent=meta(r);

        c.appendChild(img);
        c.appendChild(t);
        c.appendChild(m);

        c.onclick=async()=>{
            current=i;
            render();
            const bin=await fetchROM('./roms/nes/'+r.file);
            loadROM(bin);
        };

        side.appendChild(c);
    });
}

async function init(){
    const res=await fetch("./roms/nes/roms.json");
    roms=await res.json();
    render();
}

// FIXED CONTROLS
window.addEventListener("keydown",e=>{
    const k=e.key;
    if(k=="z") nes.buttonDown(1,jsnes.Controller.BUTTON_A);
    if(k=="x") nes.buttonDown(1,jsnes.Controller.BUTTON_B);
    if(k=="Enter") nes.buttonDown(1,jsnes.Controller.BUTTON_START);
    if(k=="Shift") nes.buttonDown(1,jsnes.Controller.BUTTON_SELECT);
    if(k=="ArrowUp") nes.buttonDown(1,jsnes.Controller.BUTTON_UP);
    if(k=="ArrowDown") nes.buttonDown(1,jsnes.Controller.BUTTON_DOWN);
    if(k=="ArrowLeft") nes.buttonDown(1,jsnes.Controller.BUTTON_LEFT);
    if(k=="ArrowRight") nes.buttonDown(1,jsnes.Controller.BUTTON_RIGHT);
});

window.addEventListener("keyup",e=>{
    const k=e.key;
    if(k=="z") nes.buttonUp(1,jsnes.Controller.BUTTON_A);
    if(k=="x") nes.buttonUp(1,jsnes.Controller.BUTTON_B);
    if(k=="Enter") nes.buttonUp(1,jsnes.Controller.BUTTON_START);
    if(k=="Shift") nes.buttonUp(1,jsnes.Controller.BUTTON_SELECT);
    if(k=="ArrowUp") nes.buttonUp(1,jsnes.Controller.BUTTON_UP);
    if(k=="ArrowDown") nes.buttonUp(1,jsnes.Controller.BUTTON_DOWN);
    if(k=="ArrowLeft") nes.buttonUp(1,jsnes.Controller.BUTTON_LEFT);
    if(k=="ArrowRight") nes.buttonUp(1,jsnes.Controller.BUTTON_RIGHT);
});

init();
</script>

</body>
</html>
