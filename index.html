<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic NES Emulator</title>
<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
<style>
body {
    background: #1a1a1a;
    color: #fff;
    font-family: 'Courier New', monospace;
    text-align: center;
}

.container {
    margin-top: 30px;
}

h1 {
    color: #ff3c3c;
    letter-spacing: 2px;
}

#screen {
    border: 8px solid #555;
    background: black;
    image-rendering: pixelated;
}

.controls {
    margin-top: 15px;
}

button {
    background: #333;
    color: white;
    border: 2px solid #777;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
}

button:hover {
    background: #555;
}

.game {
    display: inline-block;
    margin: 10px;
    cursor: pointer;
}

.game img {
    width: 120px;
    height: 160px;
    display: block;
    border: 2px solid #777;
}

.game span {
    display: block;
    margin-top: 5px;
    font-size: 12px;
}
</style>
</head>
<body>

<div class="container">
    <h1>NES Emulator</h1>
    <canvas id="screen" width="256" height="240"></canvas>

    <div class="controls">
        <input type="file" id="romInput" accept=".nes">
    </div>

    <h3>ROM Library</h3>
    <div id="gameList"></div>
</div>

<script>
const canvas = document.getElementById("screen");
const ctx = canvas.getContext("2d");
const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

const nes = new jsnes.NES({
    onFrame: function(framebuffer_24) {
        for (let i = 0; i < framebuffer_24.length; i++) {
            imageData.data[i * 4 + 0] = framebuffer_24[i] & 0xFF;
            imageData.data[i * 4 + 1] = (framebuffer_24[i] >> 8) & 0xFF;
            imageData.data[i * 4 + 2] = (framebuffer_24[i] >> 16) & 0xFF;
            imageData.data[i * 4 + 3] = 0xFF;
        }
        ctx.putImageData(imageData, 0, 0);
    }
});

let frameInterval;
function loadROM(data) {
    // Stop previous loop
    if (frameInterval) clearInterval(frameInterval);

    nes.loadROM(data);
    frameInterval = setInterval(() => nes.frame(), 1000 / 60);
}

// Upload ROM
document.getElementById("romInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function() {
        loadROM(reader.result);
    };
    reader.readAsBinaryString(file);
});

// Convert ROM name to box art URL
function getBoxArt(name) {
    const cleanName = name.replace(".nes", "");
    return `https://thumbnails.libretro.com/Nintendo%20-%20Nintendo%20Entertainment%20System/Named_Boxarts/${encodeURIComponent(cleanName)}.png`;
}

// Auto load ROMs + box art
async function loadNESRomsFromFolder() {
    const romPath = "./roms/nes/";

    try {
        const response = await fetch("./roms/nes/roms.json");
        const roms = await response.json();

        const container = document.getElementById("gameList");

        roms.forEach(rom => {
            const gameDiv = document.createElement("div");
            gameDiv.className = "game";

            const img = document.createElement("img");
            img.src = getBoxArt(rom);
            img.onerror = () => img.src = "https://via.placeholder.com/120x160?text=No+Art";

            const title = document.createElement("span");
            title.textContent = rom.replace(".nes", "");

            gameDiv.onclick = async () => {
                const res = await fetch(romPath + rom);
                const buffer = await res.arrayBuffer();

                // Convert ArrayBuffer -> binary string (required by jsnes)
                const bytes = new Uint8Array(buffer);
                let binary = "";
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }

                loadROM(binary);
            };

            gameDiv.appendChild(img);
            gameDiv.appendChild(title);
            container.appendChild(gameDiv);
        });

    } catch (err) {
        console.log("No ROM list found");
    }
}

loadNESRomsFromFolder();

// Keyboard controls
window.addEventListener("keydown", (e) => {
    switch(e.key) {
        case "ArrowUp": nes.buttonDown(1, jsnes.Controller.BUTTON_UP); break;
        case "ArrowDown": nes.buttonDown(1, jsnes.Controller.BUTTON_DOWN); break;
        case "ArrowLeft": nes.buttonDown(1, jsnes.Controller.BUTTON_LEFT); break;
        case "ArrowRight": nes.buttonDown(1, jsnes.Controller.BUTTON_RIGHT); break;
        case "z": nes.buttonDown(1, jsnes.Controller.BUTTON_A); break;
        case "x": nes.buttonDown(1, jsnes.Controller.BUTTON_B); break;
        case "Enter": nes.buttonDown(1, jsnes.Controller.BUTTON_START); break;
        case "Shift": nes.buttonDown(1, jsnes.Controller.BUTTON_SELECT); break;
    }
});

window.addEventListener("keyup", (e) => {
    switch(e.key) {
        case "ArrowUp": nes.buttonUp(1, jsnes.Controller.BUTTON_UP); break;
        case "ArrowDown": nes.buttonUp(1, jsnes.Controller.BUTTON_DOWN); break;
        case "ArrowLeft": nes.buttonUp(1, jsnes.Controller.BUTTON_LEFT); break;
        case "ArrowRight": nes.buttonUp(1, jsnes.Controller.BUTTON_RIGHT); break;
        case "z": nes.buttonUp(1, jsnes.Controller.BUTTON_A); break;
        case "x": nes.buttonUp(1, jsnes.Controller.BUTTON_B); break;
        case "Enter": nes.buttonUp(1, jsnes.Controller.BUTTON_START); break;
        case "Shift": nes.buttonUp(1, jsnes.Controller.BUTTON_SELECT); break;
    }
});
</script>

</body>
</html>
