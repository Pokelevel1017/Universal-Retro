<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Emulator Hub</title>
<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:monospace;
    overflow:hidden;
}

/* Layout */
#app{
    display:flex;
    height:100vh;
}

#sidebar{
    width:320px;
    background:#151515;
    border-right:2px solid #2a2a2a;
    overflow-y:auto;
}

#screenArea{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* Header */
#header{
    padding:10px;
    text-align:center;
    font-size:14px;
    color:#ff3b3b;
    border-bottom:1px solid #333;
}

/* Game list */
.game{
    display:flex;
    gap:10px;
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #222;
    align-items:center;
}

.game:hover{
    background:#222;
}

.game img{
    width:50px;
    height:70px;
    object-fit:cover;
    border:1px solid #444;
}

/* Canvas */
canvas{
    width:512px;
    height:480px;
    background:black;
    border:6px solid #333;
    image-rendering:pixelated;
}

/* Controls */
#controls{
    margin-top:10px;
    display:flex;
    gap:10px;
}

button{
    background:#222;
    color:#fff;
    border:1px solid #444;
    padding:6px 10px;
    cursor:pointer;
}
button:hover{background:#333;}

/* Boot screen */
#boot{
    position:absolute;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    letter-spacing:3px;
    opacity:1;
    transition:opacity 1s;
}

#boot.hide{
    opacity:0;
    pointer-events:none;
}

/* Fullscreen mode */
.fullscreen canvas{
    width:100vw;
    height:100vh;
    border:none;
}

.fullscreen #sidebar,
.fullscreen #controls{
    display:none;
}
</style>
</head>
<body>

<div id="app">

<div id="sidebar">
<div id="header">ARCADE HUB</div>
<div id="gameList"></div>
</div>

<div id="screenArea">
<div id="boot">POWERING ON...</div>
<canvas id="screen" width="256" height="240"></canvas>

<div id="controls">
<button onclick="saveState()">Save</button>
<button onclick="loadState()">Load</button>
<button onclick="toggleFullscreen()">Fullscreen</button>
</div>
</div>

</div>

<script>
let frameRunning=false;
let savedState=null;

// NES CORE
const nes=new jsnes.NES({
    onFrame(framebuffer){
        const ctx=canvas.getContext("2d");
        const imageData=ctx.getImageData(0,0,256,240);

        for(let i=0;i<framebuffer.length;i++){
            const p=framebuffer[i];
            imageData.data[i*4]=p&255;
            imageData.data[i*4+1]=(p>>8)&255;
            imageData.data[i*4+2]=(p>>16)&255;
            imageData.data[i*4+3]=255;
        }

        ctx.putImageData(imageData,0,0);
    },

    onAudioSample(left,right){
        // basic sound hook (browser handles via AudioContext if extended)
    }
});

const canvas=document.getElementById("screen");

function loop(){
    if(frameRunning) nes.frame();
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Boot animation
window.addEventListener("load",()=>{
    setTimeout(()=>{
        document.getElementById("boot").classList.add("hide");
    },1500);
});

// Load ROM
async function loadROM(binary){
    nes.loadROM(binary);
    frameRunning=true;
}

// Fetch ROM
async function fetchROM(path){
    const res=await fetch(path);
    const buf=await res.arrayBuffer();
    const bytes=new Uint8Array(buf);
    let bin="";
    for(let i=0;i<bytes.length;i++) bin+=String.fromCharCode(bytes[i]);
    return bin;
}

// Save / Load state
function saveState(){
    savedState=nes.toJSON();
    alert("State saved");
}

function loadState(){
    if(savedState) nes.fromJSON(savedState);
}

// Fullscreen arcade mode
function toggleFullscreen(){
    document.body.classList.toggle("fullscreen");
}

// Detect console
function detectConsole(file){
    const ext=file.split('.').pop().toLowerCase();
    if(ext==='nes') return 'nes';
    if(ext==='sfc'||ext==='smc') return 'snes';
    if(ext==='gba') return 'gba';
    return 'unknown';
}

// Box art
function boxArt(name){
    const clean=name.replace('.nes','');
    return `https://thumbnails.libretro.com/Nintendo%20-%20Nintendo%20Entertainment%20System/Named_Boxarts/${encodeURIComponent(clean)}.png`;
}

// Game list
async function loadGames(){
    const res=await fetch('./roms/nes/roms.json');
    const roms=await res.json();
    const list=document.getElementById("gameList");

    roms.forEach(r=>{
        const div=document.createElement("div");
        div.className="game";

        const img=document.createElement("img");
        img.src=boxArt(r);
        img.onerror=()=>img.src="https://via.placeholder.com/50x70?text=?";

        const label=document.createElement("div");
        label.textContent=r;

        div.appendChild(img);
        div.appendChild(label);

        div.onclick=async()=>{
            const bin=await fetchROM('./roms/nes/'+r);

            const consoleType=detectConsole(r);

            if(consoleType==='nes'){
                loadROM(bin);
            }else{
                alert(consoleType.toUpperCase()+" not yet supported in this build");
            }
        };

        list.appendChild(div);
    });
}

loadGames();
</script>

</body>
</html>
