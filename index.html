<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Console Hub</title>
<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
<style>
body{
    margin:0;
    font-family:monospace;
    background:#0b0b0b;
    color:#fff;
    overflow:hidden;
}

.page{display:none;height:100vh;width:100vw;}
.page.active{display:flex;}

#home{
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

#home h1{
    color:#ff3b3b;
    margin-bottom:20px;
}

.consoleGrid{
    display:grid;
    grid-template-columns:repeat(3,180px);
    gap:20px;
}

.consoleCard{
    background:#161616;
    border:2px solid #333;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
}

.consoleCard:hover{
    transform:scale(1.05);
    border-color:#ff3b3b;
}

#library{
    flex-direction:row;
}

#sidebar{
    width:320px;
    background:#141414;
    border-right:2px solid #2a2a2a;
    display:flex;
    flex-direction:column;
}

#search{
    padding:10px;
    background:#0f0f0f;
    border:none;
    color:#fff;
    outline:none;
    border-bottom:1px solid #222;
}

.gameList{
    overflow-y:auto;
    flex:1;
}

.game{
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.game:hover{background:#222;}

#screenArea{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}

canvas{
    width:512px;
    height:480px;
    background:black;
    border:6px solid #333;
    image-rendering:pixelated;
}

button{
    margin-top:10px;
    background:#222;
    color:#fff;
    border:1px solid #444;
    padding:6px 10px;
    cursor:pointer;
}

#boot{
    position:absolute;
    inset:0;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
}
#boot.hide{display:none;}

#controlsOverlay{
    position:absolute;
    right:10px;
    top:10px;
    width:220px;
    background:rgba(20,20,20,0.85);
    border:1px solid #333;
    padding:10px;
    font-size:11px;
    line-height:1.6em;
}

#controlsOverlay h3{
    margin:0 0 6px 0;
    font-size:12px;
    color:#ff3b3b;
}
</style>
</head>
<body>

<div id="home" class="page active">
    <h1>RETRO CONSOLE HUB</h1>
    <div class="consoleGrid">
        <div class="consoleCard" onclick="openConsole('nes')">NES</div>
        <div class="consoleCard" onclick="openConsole('snes')">SNES</div>
        <div class="consoleCard" onclick="openConsole('gb')">Game Boy</div>
        <div class="consoleCard" onclick="openConsole('gbc')">Game Boy Color</div>
        <div class="consoleCard" onclick="openConsole('gba')">Game Boy Advance</div>
    </div>
</div>

<div id="library" class="page">

<div id="sidebar">
    <input id="search" placeholder="Search ROMs..." oninput="filterGames()">
    <div class="gameList" id="gameList"></div>
</div>

<div id="screenArea">
<div id="boot">BOOTING...</div>
<canvas id="screen" width="256" height="240"></canvas>

<div id="controlsOverlay">
<h3>KEYBINDS</h3>
⬅➡⬆⬇ = D-Pad<br>
Z = A Button<br>
X = B Button<br>
Enter = Start<br>
Shift = Select<br>
</div>

<button onclick="backHome()">Back</button>
</div>

</div>

<script>
let currentConsole="nes";
let roms=[];
let filtered=[];
let current=0;
let running=false;

const canvas=document.getElementById("screen");
const ctx=canvas.getContext("2d");
const imageData=ctx.getImageData(0,0,256,240);

const nes=new jsnes.NES({
    onFrame(framebuffer){
        for(let i=0;i<framebuffer.length;i++){
            const p=framebuffer[i];
            imageData.data[i*4]=p&255;
            imageData.data[i*4+1]=(p>>8)&255;
            imageData.data[i*4+2]=(p>>16)&255;
            imageData.data[i*4+3]=255;
        }
        ctx.putImageData(imageData,0,0);
    }
});

let last=0;
function loop(ts){
    if(ts-last>16.67){
        if(running) nes.frame();
        last=ts;
    }
    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

window.onload=()=>setTimeout(()=>document.getElementById("boot").classList.add("hide"),800);

function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function openConsole(type){
    currentConsole=type;
    showPage('library');
    loadROMList();
}

function backHome(){
    showPage('home');
}

function loadROM(bin){
    nes.loadROM(bin);
    running=true;
}

async function fetchROM(path){
    const r=await fetch(path);
    const b=await r.arrayBuffer();
    const u=new Uint8Array(b);
    let s="";
    for(let i=0;i<u.length;i++) s+=String.fromCharCode(u[i]);
    return s;
}

function getPath(){
    return `./roms/${currentConsole}/`;
}

async function loadROMList(){
    const list=document.getElementById("gameList");
    list.innerHTML="Loading...";

    try{
        const res=await fetch(getPath()+"roms.json");
        roms=await res.json();

        filtered=roms.map(r=>r.file||r);
        renderList();

    }catch(e){
        list.innerHTML="No ROMs found";
    }
}

function renderList(){
    const list=document.getElementById("gameList");
    list.innerHTML="";

    filtered.forEach((file,i)=>{
        const div=document.createElement("div");
        div.className="game";
        div.textContent=file;

        div.onclick=async()=>{
            current=i;
            const bin=await fetchROM(getPath()+file);
            loadROM(bin);
        };

        list.appendChild(div);
    });
}

function filterGames(){
    const q=document.getElementById("search").value.toLowerCase();

    filtered=roms.map(r=>r.file||r).filter(f=>f.toLowerCase().includes(q));
    renderList();
}

window.addEventListener("keydown",e=>{
    if(currentConsole!="nes") return;
    const k=e.key;

    if(k=="z") nes.buttonDown(1,jsnes.Controller.BUTTON_A);
    if(k=="x") nes.buttonDown(1,jsnes.Controller.BUTTON_B);
    if(k=="Enter") nes.buttonDown(1,jsnes.Controller.BUTTON_START);
    if(k=="Shift") nes.buttonDown(1,jsnes.Controller.BUTTON_SELECT);
    if(k=="ArrowUp") nes.buttonDown(1,jsnes.Controller.BUTTON_UP);
    if(k=="ArrowDown") nes.buttonDown(1,jsnes.Controller.BUTTON_DOWN);
    if(k=="ArrowLeft") nes.buttonDown(1,jsnes.Controller.BUTTON_LEFT);
    if(k=="ArrowRight") nes.buttonDown(1,jsnes.Controller.BUTTON_RIGHT);
});

window.addEventListener("keyup",e=>{
    if(currentConsole!="nes") return;
    const k=e.key;

    if(k=="z") nes.buttonUp(1,jsnes.Controller.BUTTON_A);
    if(k=="x") nes.buttonUp(1,jsnes.Controller.BUTTON_B);
    if(k=="Enter") nes.buttonUp(1,jsnes.Controller.BUTTON_START);
    if(k=="Shift") nes.buttonUp(1,jsnes.Controller.BUTTON_SELECT);
    if(k=="ArrowUp") nes.buttonUp(1,jsnes.Controller.BUTTON_UP);
    if(k=="ArrowDown") nes.buttonUp(1,jsnes.Controller.BUTTON_DOWN);
    if(k=="ArrowLeft") nes.buttonUp(1,jsnes.Controller.BUTTON_LEFT);
    if(k=="ArrowRight") nes.buttonUp(1,jsnes.Controller.BUTTON_RIGHT);
});

</script>
</body>
</html>
